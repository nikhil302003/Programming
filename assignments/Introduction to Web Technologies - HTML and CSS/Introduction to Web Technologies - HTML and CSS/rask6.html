<!DOCTYPE html>
<html>
<head>
<title>Individual Registration</title>

<style>

body{
background:#bfe5e8;
font-family:Arial;
}

.container{
width:850px;
margin:auto;
background:#cfeff1;
padding:20px;
border:2px solid gray;
}

h2{
text-align:center;
background:#3aa3c7;
color:white;
padding:10px;
}

.section{
margin-top:20px;
font-weight:bold;
color:red;
}

label{
display:inline-block;
width:160px;
margin-top:10px;
}

input,select{
padding:5px;
margin-top:10px;
}

button{
margin-top:20px;
padding:8px 15px;
}

</style>
</head>

<body>

<div class="container">

<h2>Individual Registration</h2>

<div class="section">User Particulars</div>

<label>Login ID</label>
<input type="text"><br>

<label>Password</label>
<input type="password"><br>

<label>Confirm Password</label>
<input type="password"><br>

<div class="section">Personal Particulars</div>

<label>Salutation</label>
<select>
<option>Select</option>
<option>Mr</option>
<option>Mrs</option>
</select>

<label>First Name</label>
<input type="text"><br>

<label>Middle Name</label>
<input type="text">

<label>Last Name</label>
<input type="text"><br>

<label>Resident Status</label>
<select>
<option>Select</option>
<option>Resident</option>
<option>Non Resident</option>
</select>

<label>Country</label>
<select>
<option>Select</option>
<option>India</option>
<option>USA</option>
</select><br>

<label>Email ID</label>
<input type="email">

<label>Mobile Number</label>
<input type="text"><br>

<div class="section">Account Particulars</div>

<label>15 Digit Account No</label>
<input type="text">

<label>Nick Name</label>
<input type="text"><br>

<label>Fund Transfer</label>
<select>
<option>Select</option>
<option>Yes</option>
<option>No</option>
</select>

<p>
<b>Declaration:</b><br>
I have read and understood the Terms and Conditions and declare that the information provided is correct.
</p>

<button>Submit</button>
<button>Reset</button>

</div>

</body>
</html>
